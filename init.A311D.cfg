{
    "import" : [
            "/vendor/etc/init.A311D.usb.cfg"
    ],
    "jobs" : [{
            "name" : "pre-init",
            "cmds" : [
                "export LIBGL_DRIVERS_PATH /vendor/lib/chipsetsdk",
                "write /proc/sys/vm/min_free_kbytes 10240",
                "mount debugfs /sys/kernel/debug /sys/kernel/debug mode=755",
                "write /sys/kernel/debug/hisi_inno_phy/role peripheral"
            ]
        }, {
            "name" : "init",
            "cmds" : [
                "symlink /sys/kernel/debug /d",
                "symlink /sys/kernel/config /config",
                "write /proc/sys/kernel/panic 10",
                "chmod 777 /vendor/bin/init.A311D.sh",
                "exec /system/bin/sh /vendor/bin/init.A311D.sh",
                "exec /system/bin/udevadm trigger",
                "write /sys/class/gpio/export 409",
                "write /sys/class/gpio/gpio409/direction out",
                "write /sys/class/gpio/gpio409/value 1",
                "write /sys/class/gpio/export 404",
                "write /sys/class/gpio/gpio404/direction out",
                "write /sys/class/gpio/gpio404/value 1",
                "write /sys/class/gpio/export 405",
                "write /sys/class/gpio/gpio405/direction out",
                "write /sys/class/gpio/gpio405/value 0",
                "exec /system/bin/i2cset -f -y 3 0x45 0x85 0x00 b",
                "exec /system/bin/i2cset -f -y 3 0x45 0x85 0x01 b",
                "exec /system/bin/i2cset -f -y 3 0x45 0x81 0x04 b",
                "exec /system/bin/i2cset -f -y 3 0x45 0x85 0xef b",
                "exec /system/bin/i2cset -f -y 3 0x45 0x86 0xef b",
                "write /proc/1/oom_score_adj -1000",
                "write /proc/sys/kernel/hung_task_timeout_secs 90",
                "write /sys/kernel/hungtask/enable on",
                "write /sys/kernel/hungtask/monitorlist whitelist,init,appspawn",
                "write /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor conservative",
                "write /sys/devices/system/cpu/cpu2/cpufreq/scaling_governor conservative",
                "chown system system /sys/kernel/hungtask/userlist",
                "symlink /dev/block/platform/soc/ffe07000.mmc/by-name /dev/block/by-name"
            ]
        }, {
            "name" : "boot",
            "cmds" : [
                "chmod 777 /dev/ge2d",
                "chmod 777 /dev/ttyS2",
                "chmod 777 /dev/video0",
                "chmod 777 /dev/video1",
                "chmod 775 /sys/class/rfkill/rfkill0/state",
                "chown blue_host blue_host /sys/class/rfkill/rfkill0/state",
                "chmod 777 /sys/class/brightness/brightness",
                "chmod 0440 /proc/interrupts",
                "chmod 0440 /proc/stat",
                "chmod 0640 /dev/xt_qtaguid",
                "chmod 0660 /proc/net/xt_qtaguid/ctrl",
                "chmod 0440 /proc/net/xt_qtaguid/stats",
                "chown system graphics /dev/graphics/fb0",
                "chmod 777 /system/bin/sdcard_mount.sh",
                "chmod 777 /system/bin/udisk_mount.sh",
                "chmod 666 /dev/sched_rtg_ctrl",
                "chown system system /dev/sched_rtg_ctrl",
                "write /sys/class/gpio/export 380",
                "write /sys/class/gpio/export 381",
                "write /sys/class/gpio/export 382",
                "write /sys/class/gpio/export 383",
                "write /sys/class/gpio/export 384",
                "write /sys/class/gpio/export 385",
                "write /sys/class/gpio/export 386",
                "write /sys/class/gpio/export 387",
                "write /sys/class/gpio/export 388",
                "write /sys/class/gpio/export 389",
                "chmod 666 /sys/class/gpio/gpio380/direction",
                "chmod 666 /sys/class/gpio/gpio381/direction",
                "chmod 666 /sys/class/gpio/gpio382/direction",
                "chmod 666 /sys/class/gpio/gpio383/direction",
                "chmod 666 /sys/class/gpio/gpio384/direction",
                "chmod 666 /sys/class/gpio/gpio385/direction",
                "chmod 666 /sys/class/gpio/gpio386/direction",
                "chmod 666 /sys/class/gpio/gpio387/direction",
                "chmod 666 /sys/class/gpio/gpio388/direction",
                "chmod 666 /sys/class/gpio/gpio389/direction",
                "chmod 666 /sys/class/gpio/gpio380/value",
                "chmod 666 /sys/class/gpio/gpio381/value",
                "chmod 666 /sys/class/gpio/gpio382/value",
                "chmod 666 /sys/class/gpio/gpio383/value",
                "chmod 666 /sys/class/gpio/gpio384/value",
                "chmod 666 /sys/class/gpio/gpio385/value",
                "chmod 666 /sys/class/gpio/gpio386/value",
                "chmod 666 /sys/class/gpio/gpio387/value",
                "chmod 666 /sys/class/gpio/gpio388/value",
                "chmod 666 /sys/class/gpio/gpio389/value",
                "write /sys/class/pwm/pwmchip0/export 0",
                "write /sys/class/pwm/pwmchip2/export 0",
                "chmod 666 /sys/class/pwm/pwmchip0/pwm0/duty_cycle",
                "chmod 666 /sys/class/pwm/pwmchip0/pwm0/period",
                "chmod 666 /sys/class/pwm/pwmchip0/pwm0/enable",
                "chmod 666 /sys/class/pwm/pwmchip0/pwm0/polarity",
                "chmod 666 /sys/class/pwm/pwmchip2/pwm0/duty_cycle",
                "chmod 666 /sys/class/pwm/pwmchip2/pwm0/period",
                "chmod 666 /sys/class/pwm/pwmchip2/pwm0/enable",
                "chmod 666 /sys/class/pwm/pwmchip2/pwm0/polarity",
                "chmod 666 /sys/bus/iio/devices/iio:device0/in_voltage2_raw",
                "chmod 666 /sys/bus/iio/devices/iio:device0/in_voltage3_raw",
                "chmod 666 /dev/i2c-2",
                "chmod 666 /dev/i2c-3",
                "chmod 666 /dev/i2c-4",
                "chmod 666 /dev/i2c-5",
                "chmod 666 /dev/i2c-6",
                "chmod 666 /dev/i2c-7",
                "chmod 666 /dev/i2c-8",
                "chmod 666 /dev/i2c-9"
            ]
        }, {
            "name" : "post-fs-data",
            "cmds" : [
                "restorecon",
                "wait /dev/block/misc",
                "chown update update /dev/block/misc",
                "chmod 0644 /dev/block/misc"
            ]
        }
    ]
}
